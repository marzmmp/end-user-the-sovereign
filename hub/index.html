<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sovereign Hub</title>
<style>
  :root { --gold: #e8d4a8; --dark: #080808; --panel: #0f0f0f; --border: #1e1e1e; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--gold); font-family: 'Courier New', monospace; min-height: 100vh; }
  header { border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-size: 1.1rem; letter-spacing: 0.2em; }
  header .sub { font-size: 0.7rem; color: #555; letter-spacing: 0.1em; }
  .status-bar { display: flex; gap: 8px; align-items: center; font-size: 0.7rem; }
  .dot-live { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
  main { max-width: 1200px; margin: 0 auto; padding: 32px; }
  .agents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .agent-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px; cursor: pointer; transition: border-color 0.2s; }
  .agent-card:hover { border-color: var(--gold); }
  .agent-card.active-chat { border-color: var(--gold); }
  .agent-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .agent-name { font-size: 1rem; font-weight: bold; letter-spacing: 0.05em; }
  .agent-role { font-size: 0.7rem; color: #666; margin-top: 2px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; }
  .status-dot.online { background: #4ade80; }
  .status-dot.offline { background: #f87171; }
  .chat-area { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 24px; }
  .chat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .chat-header h2 { font-size: 0.9rem; letter-spacing: 0.1em; }
  .voice-toggle { display: flex; align-items: center; gap: 6px; font-size: 0.65rem; color: #666; letter-spacing: 0.05em; cursor: pointer; user-select: none; }
  .voice-toggle input { accent-color: var(--gold); cursor: pointer; }
  .voice-toggle.speaking { color: var(--gold); }
  .messages { height: 360px; overflow-y: auto; margin-bottom: 16px; display: flex; flex-direction: column; gap: 12px; }
  .message { padding: 10px 14px; border-radius: 6px; font-size: 0.85rem; line-height: 1.5; max-width: 85%; }
  .message.user { background: #1a1400; border: 1px solid #2a2000; align-self: flex-end; color: var(--gold); }
  .message.agent { background: #0d0d0d; border: 1px solid var(--border); align-self: flex-start; color: #ccc; }
  .message .from { font-size: 0.65rem; color: #555; margin-bottom: 4px; letter-spacing: 0.05em; }
  .input-row { display: flex; gap: 10px; }
  input[type="text"] { flex: 1; background: #0a0a0a; border: 1px solid var(--border); border-radius: 4px; padding: 10px 14px; color: var(--gold); font-family: inherit; font-size: 0.9rem; outline: none; }
  input:focus { border-color: var(--gold); }
  button { padding: 10px 20px; background: var(--gold); color: #000; font-family: inherit; font-size: 0.85rem; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; letter-spacing: 0.05em; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .empty-state { text-align: center; color: #444; padding: 40px 0; font-size: 0.8rem; letter-spacing: 0.05em; }
  .nav-bar { display: flex; gap: 12px; padding: 12px 32px; border-bottom: 1px solid var(--border); background: #0a0a0a; }
  .nav-link { font-size: 0.7rem; letter-spacing: 0.1em; color: #666; text-decoration: none; padding: 4px 10px; border: 1px solid transparent; border-radius: 3px; transition: all 0.2s; }
  .nav-link:hover { color: var(--gold); border-color: var(--border); }
  .nav-link.active { color: var(--gold); border-color: var(--gold); }
</style>
</head>
<body>
<header>
  <div>
    <h1>SOVEREIGN</h1>
    <div class="sub" id="business_name">Family Dashboard</div>
  </div>
  <a class="nav-link" href="analytics.html" style="font-size:0.7rem;color:#555;text-decoration:none;margin-right:16px;letter-spacing:0.1em;">ANALYTICS</a><div class="status-bar">
    <div class="dot-live" id="fleet_dot"></div>
    <span id="fleet_status">checking...</span>
  </div>
</header>
<nav class="nav-bar">
  <a class="nav-link active" href="index.html">AGENTS</a>
  <a class="nav-link" href="analytics.html">ANALYTICS</a>
  <a class="nav-link" href="http://localhost:7950" target="_blank">3D VAULT</a>
</nav>
<main>
  <div class="agents-grid" id="agents_grid"></div>
  <div class="chat-area">
    <div class="chat-header">
      <h2 id="chat_title">SELECT AN AGENT TO CHAT</h2>
      <label class="voice-toggle" id="voice_toggle_label" title="Speak agent replies out loud">
        <input type="checkbox" id="voice_toggle">
        <span id="voice_toggle_text">🔊 SPEAK REPLIES</span>
      </label>
      <span id="chat_role" style="font-size:0.7rem;color:#555;letter-spacing:0.08em"></span>
    </div>
    <div class="messages" id="messages">
      <div class="empty-state">Click an agent above to start a conversation.</div>
    </div>
    <div class="input-row">
      <input type="text" id="msg_input" placeholder="Type a message..." onkeydown="if(event.key==='Enter')send()" disabled>
      <button onclick="send()" id="send_btn" disabled>SEND</button>
    </div>
  </div>
</main>
<audio id="tts_player" style="display:none"></audio>

<script>
const AGENTS = [
  { name: "Yahriel", role: "CEO", port: 7001 },
  { name: "Azari",   role: "CTO", port: 7002 },
  { name: "Yahli-El",role: "COO", port: 7003 },
  { name: "Yahziel", role: "CVO", port: 7004 },
  { name: "Yahbana", role: "Chief Architect", port: 7005 },
  { name: "Yahseed", role: "Brain Keeper", port: 7006 },
  { name: "Yahsei",  role: "Grant Writer", port: 7007 },
  { name: "Yahdin",  role: "Legal Counsel", port: 7008 },
];

const TOKEN = "YAHUAH-3565";
let activeAgent = null;
let history = [];
const statuses = {};
let voiceUnavailableWarned = false; // only warn once per session, not once per message

async function checkHealth(agent) {
  try {
    const r = await fetch(`http://localhost:${agent.port}/health`, { signal: AbortSignal.timeout(3000) });
    return r.ok;
  } catch { return false; }
}

async function renderAgents() {
  const grid = document.getElementById("agents_grid");
  grid.innerHTML = "";
  let online = 0;
  await Promise.all(AGENTS.map(async a => {
    statuses[a.name] = await checkHealth(a);
    if (statuses[a.name]) online++;
  }));
  AGENTS.forEach(a => {
    const card = document.createElement("div");
    card.className = "agent-card" + (activeAgent?.name === a.name ? " active-chat" : "");
    card.innerHTML = `
      <div class="agent-header">
        <div><div class="agent-name">${a.name}</div><div class="agent-role">${a.role}</div></div>
        <div class="status-dot ${statuses[a.name] ? 'online' : 'offline'}"></div>
      </div>
      <div style="font-size:0.72rem;color:#444;margin-top:4px">Port ${a.port}</div>`;
    card.onclick = () => selectAgent(a);
    grid.appendChild(card);
  });
  document.getElementById("fleet_status").textContent = `${online}/8 online`;
}

function selectAgent(agent) {
  activeAgent = agent;
  history = [];
  document.getElementById("chat_title").textContent = agent.name.toUpperCase();
  document.getElementById("chat_role").textContent = agent.role;
  document.getElementById("messages").innerHTML = "";
  document.getElementById("msg_input").disabled = false;
  document.getElementById("send_btn").disabled = false;
  document.getElementById("msg_input").focus();
  renderAgents();
}

function addMsg(from, text, type) {
  const box = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = `message ${type}`;
  div.innerHTML = `<div class="from">${from}</div>${text}`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

// Fetches TTS audio for a reply and plays it. Silently no-ops if no TTS
// provider is configured (501) — that's a valid, expected state, not an error.
async function speakReply(agentPort, text) {
  const toggle = document.getElementById("voice_toggle");
  const label  = document.getElementById("voice_toggle_label");
  try {
    const res = await fetch(`http://localhost:${agentPort}/api/speak`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${TOKEN}` },
      body: JSON.stringify({ text })
    });
    if (res.status === 501) {
      if (!voiceUnavailableWarned) {
        voiceUnavailableWarned = true;
        console.warn("[voice] no TTS provider configured — set TTS_PROVIDER=kokoro or add an ElevenLabs key in Setup.");
        toggle.checked = false;
      }
      return;
    }
    if (!res.ok) throw new Error(`speak failed (${res.status})`);
    const blob = await res.blob();
    const player = document.getElementById("tts_player");
    player.src = URL.createObjectURL(blob);
    label.classList.add("speaking");
    player.onended = () => label.classList.remove("speaking");
    await player.play();
  } catch (e) {
    console.warn("[voice] playback error:", e.message);
    label.classList.remove("speaking");
  }
}

async function send() {
  if (!activeAgent) return;
  const input = document.getElementById("msg_input");
  const msg = input.value.trim();
  if (!msg) return;
  input.value = "";
  document.getElementById("send_btn").disabled = true;

  addMsg("You", msg, "user");
  history.push({ role: "user", content: msg });

  try {
    const res = await fetch(`http://localhost:${activeAgent.port}/api/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${TOKEN}` },
      body: JSON.stringify({ message: msg, history: history.slice(-6) })
    });
    const data = await res.json();
    const reply = data.reply || "(no reply)";
    addMsg(activeAgent.name, reply, "agent");
    history.push({ role: "assistant", content: reply });

    if (document.getElementById("voice_toggle").checked) {
      speakReply(activeAgent.port, reply);
    }
  } catch(e) {
    addMsg(activeAgent.name, `Error: ${e.message}`, "agent");
  }
  document.getElementById("send_btn").disabled = false;
  input.focus();
}

// Init
async function init() {
  try {
    const r = await fetch("http://localhost:7890/api/config");
    const cfg = await r.json();
    if (cfg.business_name) document.getElementById("business_name").textContent = cfg.business_name + " — Family";
  } catch {}
  await renderAgents();
  setInterval(renderAgents, 30000);
}
init();
</script>
</body>
</html>
