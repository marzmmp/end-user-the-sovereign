<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sovereign Vault</title>
<style>
  :root { --gold: #e8d4a8; --dark: #060606; --panel: #0d0d0d; --border: #1a1a1a; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--gold); font-family: 'Courier New', monospace; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

  /* Lock screen */
  #lock_screen { text-align: center; max-width: 400px; width: 100%; padding: 40px 24px; }
  #lock_screen h1 { font-size: 1.5rem; letter-spacing: 0.2em; margin-bottom: 8px; }
  #lock_screen p { color: #555; font-size: 0.75rem; letter-spacing: 0.1em; margin-bottom: 32px; }
  .lock-icon { font-size: 3rem; margin-bottom: 24px; filter: grayscale(1) brightness(0.6); }
  input[type="password"] { width: 100%; background: #0a0a0a; border: 1px solid var(--border); border-radius: 4px; padding: 12px 16px; color: var(--gold); font-family: inherit; font-size: 1rem; outline: none; text-align: center; letter-spacing: 0.2em; margin-bottom: 16px; }
  input:focus { border-color: var(--gold); }
  .unlock-btn { width: 100%; padding: 12px; background: var(--gold); color: #000; font-family: inherit; font-size: 0.9rem; font-weight: bold; letter-spacing: 0.15em; border: none; border-radius: 4px; cursor: pointer; }
  .unlock-btn:hover { opacity: 0.9; }
  .error-msg { color: #f87171; font-size: 0.75rem; margin-top: 12px; min-height: 18px; letter-spacing: 0.05em; }

  /* Vault content */
  #vault_content { display: none; width: 100%; max-width: 800px; padding: 32px 24px; }
  .vault-header { text-align: center; margin-bottom: 40px; }
  .vault-header h1 { font-size: 1.2rem; letter-spacing: 0.2em; }
  .vault-header p { color: #555; font-size: 0.7rem; letter-spacing: 0.1em; margin-top: 6px; }
  .keys-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; }
  .key-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
  .key-label { font-size: 0.7rem; color: #555; letter-spacing: 0.1em; margin-bottom: 8px; }
  .key-value { font-size: 0.8rem; color: var(--gold); word-break: break-all; }
  .key-value.masked { color: #333; letter-spacing: 0.1em; }
  .reveal-btn { font-size: 0.65rem; color: #555; background: none; border: none; cursor: pointer; font-family: inherit; margin-top: 6px; letter-spacing: 0.05em; }
  .reveal-btn:hover { color: var(--gold); }
  .lock-out-btn { display: block; margin: 0 auto; padding: 10px 24px; background: transparent; border: 1px solid var(--border); color: #555; font-family: inherit; font-size: 0.75rem; letter-spacing: 0.1em; cursor: pointer; border-radius: 4px; }
  .lock-out-btn:hover { border-color: var(--gold); color: var(--gold); }
  .section-title { font-size: 0.7rem; color: #555; letter-spacing: 0.15em; margin-bottom: 16px; text-transform: uppercase; }
</style>
</head>
<body>

<!-- Lock Screen -->
<div id="lock_screen">
  <div class="lock-icon">🔐</div>
  <h1>SOVEREIGN VAULT</h1>
  <p>TRUESITE TECHNOLOGIES — 3565</p>
  <input type="password" id="vault_pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')unlock()">
  <button class="unlock-btn" onclick="unlock()">UNLOCK</button>
  <div class="error-msg" id="error_msg"></div>
</div>

<!-- Vault Content -->
<div id="vault_content">
  <div class="vault-header">
    <h1>SOVEREIGN VAULT</h1>
    <p id="business_label">Secured Configuration</p>
  </div>

  <p class="section-title">API Keys</p>
  <div class="keys-grid" id="keys_grid"></div>

  <button class="lock-out-btn" onclick="lockOut()">LOCK VAULT</button>
</div>

<script>
let config = {};

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function unlock() {
  const pw = document.getElementById('vault_pw').value;
  if (!pw) return;

  try {
    const r = await fetch('http://localhost:7890/api/config');
    config = await r.json();
  } catch {
    document.getElementById('error_msg').textContent = 'Setup server not reachable. Start sovereign first.';
    return;
  }

  const hash = await sha256(pw);
  if (hash !== config.vault_password_hash) {
    document.getElementById('error_msg').textContent = 'Incorrect password.';
    document.getElementById('vault_pw').value = '';
    return;
  }

  document.getElementById('lock_screen').style.display = 'none';
  document.getElementById('vault_content').style.display = 'block';
  if (config.business_name) {
    document.getElementById('business_label').textContent = config.business_name + ' — Secured Configuration';
  }
  renderKeys();
}

function renderKeys() {
  const KEY_LABELS = {
    openai_api_key:      'OpenAI API Key',
    nvidia_nim_api_key:  'NVIDIA NIM API Key',
    brave_api_key:       'Brave Search API Key',
    tavily_api_key:      'Tavily API Key',
    elevenlabs_api_key:  'ElevenLabs API Key',
    business_name:       'Business Name',
    inference_provider:  'Inference Provider',
    tts_provider:        'TTS Provider',
  };

  const grid = document.getElementById('keys_grid');
  grid.innerHTML = '';

  Object.entries(KEY_LABELS).forEach(([key, label]) => {
    const val = config[key] || '(not set)';
    const isSecret = key.includes('api_key');
    const card = document.createElement('div');
    card.className = 'key-card';
    card.innerHTML = `
      <div class="key-label">${label}</div>
      <div class="key-value ${isSecret ? 'masked' : ''}" id="val_${key}">
        ${isSecret ? '•'.repeat(Math.min(val.length, 24)) : val}
      </div>
      ${isSecret ? `<button class="reveal-btn" onclick="toggleReveal('${key}','${val}')">REVEAL</button>` : ''}
    `;
    grid.appendChild(card);
  });
}

function toggleReveal(key, val) {
  const el = document.getElementById('val_' + key);
  const btn = el.nextElementSibling;
  if (el.classList.contains('masked')) {
    el.textContent = val;
    el.classList.remove('masked');
    btn.textContent = 'HIDE';
  } else {
    el.textContent = '•'.repeat(Math.min(val.length, 24));
    el.classList.add('masked');
    btn.textContent = 'REVEAL';
  }
}

function lockOut() {
  document.getElementById('vault_content').style.display = 'none';
  document.getElementById('lock_screen').style.display = 'block';
  document.getElementById('vault_pw').value = '';
  config = {};
}
</script>
</body>
</html>
