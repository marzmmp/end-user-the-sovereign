# Step 1: bash scripts/build.sh  (builds all 8 agent images)
# Step 2: bash scripts/restart_all.sh (or: docker compose up -d)

services:
  setup:
    image: python:3.11-slim
    working_dir: /app
    command: python3 setup/setup_server.py
    ports: ["7890:7890"]
    volumes: [".:/app"]
    restart: unless-stopped

  hub:
    image: nginx:alpine
    ports: ["7900:80"]
    volumes:
      - ./hub:/usr/share/nginx/html:ro
      - ./hub/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  vault:
    image: nginx:alpine
    ports: ["7950:80"]
    volumes:
      - ./vault:/usr/share/nginx/html:ro
    restart: unless-stopped

  # Local, free, offline text-to-speech. Only used when TTS_PROVIDER=kokoro
  # (set by the setup wizard). Harmless to leave running otherwise — it just
  # idles until an agent's /api/speak route calls it.
  kokoro:
    build:
      context: ./kokoro
      dockerfile: Dockerfile
    image: sovereign-kokoro
    ports: ["7960:7960"]
    volumes:
      - ./kokoro/models:/app/models:ro
    restart: unless-stopped

  yahriel:
    image: sovereign-yahriel
    ports: ["7001:7001"]
    env_file: .env
    environment: [PORT=7001]
    depends_on: [kokoro]
    restart: unless-stopped

  azari:
    image: sovereign-azari
    ports: ["7002:7002"]
    env_file: .env
    environment: [PORT=7002]
    depends_on: [kokoro]
    restart: unless-stopped

  yahli-el:
    image: sovereign-yahli-el
    ports: ["7003:7003"]
    env_file: .env
    environment: [PORT=7003]
    depends_on: [kokoro]
    restart: unless-stopped

  yahziel:
    image: sovereign-yahziel
    ports: ["7004:7004"]
    env_file: .env
    environment: [PORT=7004]
    depends_on: [kokoro]
    restart: unless-stopped

  yahbana:
    image: sovereign-yahbana
    ports: ["7005:7005"]
    env_file: .env
    environment: [PORT=7005]
    depends_on: [kokoro]
    restart: unless-stopped

  yahseed:
    image: sovereign-yahseed
    ports: ["7006:7006"]
    env_file: .env
    environment: [PORT=7006]
    depends_on: [kokoro]
    restart: unless-stopped

  yahsei:
    image: sovereign-yahsei
    ports: ["7007:7007"]
    env_file: .env
    environment: [PORT=7007]
    depends_on: [kokoro]
    restart: unless-stopped

  yahdin:
    image: sovereign-yahdin
    ports: ["7008:7008"]
    env_file: .env
    environment: [PORT=7008]
    depends_on: [kokoro]
    restart: unless-stopped
