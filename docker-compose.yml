version: '3.9'

services:
  setup:
    build: ./setup
    ports: ["7890:7890"]
    volumes:
      - .:/app
    environment:
      - PORT=7890
    restart: unless-stopped

  hub:
    image: nginx:alpine
    ports: ["7900:80"]
    volumes:
      - ./hub:/usr/share/nginx/html:ro
    restart: unless-stopped

  yahriel:
    build:
      context: ./agents/yahriel
      dockerfile: ../../core/Dockerfile.agent
    ports: ["7001:7001"]
    env_file: .env
    environment: [PORT=7001]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7001/health"]
      interval: 30s
      timeout: 5s

  azari:
    build:
      context: ./agents/azari
      dockerfile: ../../core/Dockerfile.agent
    ports: ["7002:7002"]
    env_file: .env
    environment: [PORT=7002]
    restart: unless-stopped

  yahli-el:
    build:
      context: ./agents/yahli-el
      dockerfile: ../../core/Dockerfile.agent
    ports: ["7003:7003"]
    env_file: .env
    environment: [PORT=7003]
    restart: unless-stopped

  yahziel:
    build:
      context: ./agents/yahziel
      dockerfile: ../../core/Dockerfile.agent
    ports: ["7004:7004"]
    env_file: .env
    environment: [PORT=7004]
    restart: unless-stopped

  yahbana:
    build:
      context: ./agents/yahbana
      dockerfile: ../../core/Dockerfile.agent
    ports: ["7005:7005"]
    env_file: .env
    environment: [PORT=7005]
    restart: unless-stopped

  yahseed:
    build:
      context: ./agents/yahseed
      dockerfile: ../../core/Dockerfile.agent
    ports: ["7006:7006"]
    env_file: .env
    environment: [PORT=7006]
    restart: unless-stopped

  yahsei:
    build:
      context: ./agents/yahsei
      dockerfile: ../../core/Dockerfile.agent
    ports: ["7007:7007"]
    env_file: .env
    environment: [PORT=7007]
    restart: unless-stopped

  yahdin:
    build:
      context: ./agents/yahdin
      dockerfile: ../../core/Dockerfile.agent
    ports: ["7008:7008"]
    env_file: .env
    environment: [PORT=7008]
    restart: unless-stopped
